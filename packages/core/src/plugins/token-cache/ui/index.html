<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Cache Plugin</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { padding: 20px; }
    /* Hide scrollbars for panels */
    .panel-mode { overflow: hidden; padding: 10px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Status View (Header Menu) -->
    <div id="status-view" class="hidden">
      <h1 class="text-2xl font-bold mb-4">Real-time Cache Status</h1>
      <div class="alert alert-info shadow-lg mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <div>
          <h3 class="font-bold">System Active</h3>
          <div class="text-xs">Token cache is running and processing requests.</div>
        </div>
      </div>
      <div class="stats shadow w-full">
        <div class="stat">
          <div class="stat-title">Current Cache Size</div>
          <div class="stat-value">12.4 MB</div>
          <div class="stat-desc">240 items cached</div>
        </div>
      </div>
    </div>

    <!-- Settings View (Plugin Management Detail) -->
    <div id="settings-view" class="hidden">
      <h1 class="text-2xl font-bold mb-4">Plugin Settings</h1>
      <div class="form-control w-full max-w-xs">
        <label class="label">
          <span class="label-text">Cache TTL (seconds)</span>
        </label>
        <input type="number" placeholder="60" class="input input-bordered w-full max-w-xs" disabled value="60" />
        <label class="label">
          <span class="label-text-alt">Configured in code (demo)</span>
        </label>
      </div>

      <div class="form-control w-full max-w-xs mt-4">
        <label class="label">
          <span class="label-text">Max Cache Size (MB)</span>
        </label>
        <input type="range" min="0" max="100" value="50" class="range" step="10" />
        <div class="w-full flex justify-between text-xs px-2">
          <span>0</span>
          <span>50</span>
          <span>100</span>
        </div>
      </div>
    </div>

    <!-- Stats Panel (Dashboard Widget) -->
    <div id="stats-panel-view" class="hidden">
      <div class="stats stats-vertical lg:stats-horizontal shadow w-full">
        <div class="stat place-items-center">
          <div class="stat-title">Hits</div>
          <div class="stat-value text-primary" id="stats-hits">0</div>
        </div>
        <div class="stat place-items-center">
          <div class="stat-title">Misses</div>
          <div class="stat-value text-secondary" id="stats-misses">0</div>
        </div>
        <div class="stat place-items-center">
          <div class="stat-title">Rate</div>
          <div class="stat-value" id="stats-rate">0%</div>
        </div>
      </div>
      <button class="btn btn-xs btn-ghost w-full mt-1" onclick="refreshStats()">Refresh</button>
    </div>
  </div>

  <script>
    // Theme sync
    window.addEventListener('message', (event) => {
      if (event.data.type === 'bungee:theme') {
        document.documentElement.setAttribute('data-theme', event.data.theme);
      }
    });

    // Router
    function handleRoute() {
      // Get route from hash, removing the #
      const route = window.location.hash.substring(1) || '/status';

      // Hide all views
      document.getElementById('status-view').classList.add('hidden');
      document.getElementById('settings-view').classList.add('hidden');
      document.getElementById('stats-panel-view').classList.add('hidden');
      document.body.classList.remove('panel-mode');

      if (route === '/status') {
        document.getElementById('status-view').classList.remove('hidden');
      } else if (route === '/settings') {
        document.getElementById('settings-view').classList.remove('hidden');
      } else if (route === '/panel/stats') {
        document.getElementById('stats-panel-view').classList.remove('hidden');
        document.body.classList.add('panel-mode');
        refreshStats();
      }
    }

    window.addEventListener('hashchange', handleRoute);
    // Initial load
    handleRoute();

    function refreshStats() {
      // Demo logic
      const hits = Math.floor(Math.random() * 100);
      const misses = Math.floor(Math.random() * 50);
      const total = hits + misses;
      const rate = total === 0 ? 0 : Math.round((hits / total) * 100);

      document.getElementById('stats-hits').innerText = hits;
      document.getElementById('stats-misses').innerText = misses;
      document.getElementById('stats-rate').innerText = rate + '%';
    }
  </script>
</body>
</html>
